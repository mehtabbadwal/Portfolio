<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA redirect
      // Redirects from 404.html to index.html with path preserved
      var pathSegments = window.location.pathname.split('/').filter(function(s) { return s; });
      var repo = pathSegments[0]; // Repository name (Portfolio)

      // Store the path for the router
      sessionStorage.setItem('redirect', window.location.pathname);

      // Redirect to index.html
      window.location.replace(
        window.location.origin + '/' + repo + '/index.html'
      );
    </script>
  </head>
  <body>
  </body>
</html>
