<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // SPA redirect for GitHub Pages (root domain, no subfolder)
      // Stores the requested path and redirects to index.html
      sessionStorage.setItem('redirect', window.location.pathname + window.location.search + window.location.hash);
      window.location.replace(window.location.origin + '/');
    </script>
  </head>
  <body>
  </body>
</html>
